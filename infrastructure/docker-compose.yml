services:
  postgres:
    image: postgres:16
    container_name: atlas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_password
      POSTGRES_DB: atlas_ai
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: atlas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  atlas_postgres_data:
